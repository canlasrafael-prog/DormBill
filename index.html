<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dorm Bill Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #f0c040;
    --accent2: #5ee8b5;
    --danger: #f25c5c;
    --warn: #f07840;
    --text: #e8e8ee;
    --muted: #7a7a8c;
    --radius: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; color: var(--accent); }
  header .logo span { color: var(--text); }
  .tabs { display: flex; gap: 4px; margin-left: auto; }
  .tab-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 7px 18px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .tab-btn:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }
  .tab-btn.active { background: var(--surface2); color: var(--accent); border-color: var(--accent); }

  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px 0; }
  .section { display: none; }
  .section.active { display: block; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
  }

  label { font-size: 0.82rem; color: var(--muted); display: block; margin-bottom: 5px; font-weight: 600; }
  input[type=text], input[type=number], input[type=date], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 9px 13px;
    border-radius: 6px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  .form-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
  .form-group { flex: 1; min-width: 150px; }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 9px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #111; }
  .btn-primary:hover { background: #ffe066; }
  .btn-success { background: var(--accent2); color: #111; }
  .btn-success:hover { opacity: 0.85; }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 12px; font-size: 0.78rem; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* Member list */
  .member-list { list-style: none; }
  .member-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .member-item-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    flex-wrap: wrap;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }
  .dot.inactive { background: var(--muted); }
  .member-name { font-weight: 700; font-size: 0.98rem; min-width: 80px; }
  .member-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; flex: 1; }
  .badge {
    font-size: 0.68rem;
    padding: 2px 9px;
    border-radius: 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .badge-away   { background: #1a2e20; color: var(--accent2); border: 1px solid #2a4a30; }
  .badge-out    { background: #2a1010; color: var(--danger);  border: 1px solid #4a2020; }
  .badge-movein { background: #1a1a2e; color: #9999ff;        border: 1px solid #2a2a4a; }

  /* Manage panel */
  .manage-panel {
    border-top: 1px solid var(--border);
    padding: 18px 16px;
    background: #16161c;
  }
  .manage-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
  .mtab {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .mtab.active { border-color: var(--accent); color: var(--accent); background: #2a2410; }

  .period-list { list-style: none; margin-top: 10px; }
  .period-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }
  .period-item:last-child { border-bottom: none; }
  .period-item .pi-dates { flex: 1; }

  .info-note {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 13px;
    margin-bottom: 14px;
    line-height: 1.6;
  }

  /* Results */
  .result-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .result-table th {
    text-align: left;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    font-family: 'DM Mono', monospace;
  }
  .result-table td { padding: 11px 12px; border-bottom: 1px solid #1e1e24; font-family: 'DM Mono', monospace; }
  .result-table tr:hover td { background: var(--surface2); }
  .amount { color: var(--accent); font-weight: 500; }
  .total-row td { border-top: 2px solid var(--border); font-weight: 700; color: var(--accent2); }

  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .summary-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; }
  .summary-box .s-label { font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .summary-box .s-value { font-size: 1.5rem; font-weight: 800; color: var(--accent); font-family: 'DM Mono', monospace; }
  .summary-box .s-value.green { color: var(--accent2); }

  .day-grid { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 12px; }
  .day-chip {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 6px 9px;
    border-radius: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: default;
    transition: border-color 0.12s;
  }
  .day-chip:hover { border-color: var(--accent); }
  .day-chip .pax-num { font-weight: 700; color: var(--text); }

  .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
  .section-header h2 { font-size: 1.4rem; font-weight: 800; }
  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    padding: 3px 12px;
    color: var(--muted);
  }

  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    color: #111;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 10px 24px;
    border-radius: 30px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 9999;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .table-wrap { overflow-x: auto; }
</style>
</head>
<body>

<header>
  <div class="logo">DORM<span>BILL</span></div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('members', this)">Members</button>
    <button class="tab-btn" onclick="switchTab('bills', this)">Bills</button>
    <button class="tab-btn" onclick="switchTab('results', this)">Results</button>
  </div>
</header>

<main>

<!-- ===== MEMBERS ===== -->
<div id="tab-members" class="section active">
  <div class="section-header">
    <h2>Members</h2>
    <span class="pill" id="member-count-pill">0 members</span>
  </div>

  <div class="card">
    <div class="card-title">Add New Member</div>
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="new-member-name" placeholder="e.g. Raf">
      </div>
      <div class="form-group">
        <label>Move-in Date <small style="font-weight:400">(optional)</small></label>
        <input type="date" id="new-member-movein">
      </div>
      <div class="form-group">
        <label>Move-out Date <small style="font-weight:400">(optional)</small></label>
        <input type="date" id="new-member-moveout">
      </div>
      <div class="form-group" style="display:flex;align-items:flex-end;">
        <button class="btn btn-primary" style="width:100%;" onclick="addMember()">+ Add Member</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Current Members — click "Manage" to set away periods or edit dates</div>
    <ul class="member-list" id="member-list"></ul>
  </div>
</div>

<!-- ===== BILLS ===== -->
<div id="tab-bills" class="section">
  <div class="section-header"><h2>Bills</h2></div>
  <div class="card">
    <div class="card-title">Add New Bill</div>
    <div class="form-row">
      <div class="form-group">
        <label>Bill Label</label>
        <input type="text" id="bill-label" placeholder="e.g. Water March 2026">
      </div>
      <div class="form-group">
        <label>Total Amount (₱)</label>
        <input type="number" id="bill-amount" placeholder="e.g. 1412" min="0" step="0.01">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Start Date</label>
        <input type="date" id="bill-start">
      </div>
      <div class="form-group">
        <label>End Date</label>
        <input type="date" id="bill-end">
      </div>
      <div class="form-group" style="display:flex;align-items:flex-end;">
        <button class="btn btn-primary" style="width:100%;" onclick="addBill()">+ Add Bill</button>
      </div>
    </div>
  </div>
  <div id="bill-list"></div>
</div>

<!-- ===== RESULTS ===== -->
<div id="tab-results" class="section">
  <div class="section-header"><h2>Results</h2></div>
  <div class="form-row" style="margin-bottom:20px;align-items:flex-end;">
    <div class="form-group" style="max-width:340px;">
      <label>Select Bill</label>
      <select id="result-bill-select" onchange="renderResults()">
        <option value="">-- choose a bill --</option>
      </select>
    </div>
    <button class="btn btn-success" onclick="renderResults()">Compute</button>
  </div>
  <div id="results-output"></div>
</div>

</main>
<div id="toast"></div>

<script>
// ============================================================
// STATE
// member: { id, name, moveIn, moveOut, away:[{from,to}] }
// bill:   { id, label, amount, start, end }
// ============================================================
let state = { members: [], bills: [] };
let openPanelId   = null;
let openPanelTab  = {};   // memberId -> 'dates'|'away'

// ============================================================
// PERSISTENCE
// ============================================================
function save() { localStorage.setItem('dormbill_v3', JSON.stringify(state)); }
function load() {
  try {
    const raw = localStorage.getItem('dormbill_v3');
    if (raw) state = JSON.parse(raw);
    // ensure arrays exist (migration)
    state.members.forEach(m => {
      if (!m.away)   m.away   = [];
      if (!m.leaves) m.leaves = [];
      if (m.moveOut === undefined) m.moveOut = '';
    });
  } catch(e) {}
}

// ============================================================
// HELPERS
// ============================================================
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function fmt(n) {
  return '₱' + Number(n).toLocaleString('en-PH', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

function toast(msg, clr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = clr || 'var(--accent2)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function switchTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'results') populateBillSelect();
}

function parseDate(str) {
  if (!str) return null;
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmtDate(str) {
  if (!str) return '—';
  return parseDate(str).toLocaleDateString('en-PH', { month:'short', day:'numeric', year:'numeric' });
}
function fmtShort(str) {
  if (!str) return '—';
  return parseDate(str).toLocaleDateString('en-PH', { month:'short', day:'numeric' });
}
function dateKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function daysInRange(s, e) {
  const arr=[], cur=parseDate(s), end=parseDate(e);
  if (!cur||!end) return arr;
  while(cur<=end){ arr.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
  return arr;
}

// Returns true if member should NOT be billed on date dk (YYYY-MM-DD string)
function isAbsent(m, dk) {
  const d = parseDate(dk);
  if (m.moveIn  && d < parseDate(m.moveIn))  return true;
  if (m.moveOut && d > parseDate(m.moveOut)) return true;
  for (const a of (m.away||[]))   { if (d >= parseDate(a.from) && d <= parseDate(a.to)) return true; }
  for (const a of (m.leaves||[])) { if (d >= parseDate(a.from) && d <= parseDate(a.to)) return true; }
  return false;
}

// ============================================================
// MEMBERS
// ============================================================
function addMember() {
  const name    = document.getElementById('new-member-name').value.trim();
  const moveIn  = document.getElementById('new-member-movein').value;
  const moveOut = document.getElementById('new-member-moveout').value;
  if (!name) { toast('Enter a name!','var(--danger)'); return; }
  if (moveIn && moveOut && parseDate(moveIn) > parseDate(moveOut)) {
    toast('Move-in must be before move-out!','var(--danger)'); return;
  }
  state.members.push({ id:uid(), name, moveIn, moveOut, away:[], leaves:[] });
  document.getElementById('new-member-name').value = '';
  document.getElementById('new-member-movein').value = '';
  document.getElementById('new-member-moveout').value = '';
  save(); renderMembers(); toast(name + ' added!');
}

function removeMember(id) {
  if (!confirm('Remove this member and all their data?')) return;
  state.members = state.members.filter(m => m.id !== id);
  if (openPanelId === id) openPanelId = null;
  save(); renderMembers();
}

function saveDates(id) {
  const m       = state.members.find(m => m.id === id);
  const moveIn  = document.getElementById('ei-'+id).value;
  const moveOut = document.getElementById('eo-'+id).value;
  if (moveIn && moveOut && parseDate(moveIn) > parseDate(moveOut)) {
    toast('Move-in must be before move-out!','var(--danger)'); return;
  }
  m.moveIn  = moveIn;
  m.moveOut = moveOut;
  save(); renderMembers();
  // reopen same panel
  openPanelId = id;
  openPanelTab[id] = 'dates';
  renderMembers();
  toast('Dates saved!');
}

function addAway(id) {
  const from = document.getElementById('af-'+id).value;
  const to   = document.getElementById('at-'+id).value;
  if (!from||!to) { toast('Enter both dates!','var(--danger)'); return; }
  if (parseDate(from)>parseDate(to)) { toast('From must be before To!','var(--danger)'); return; }
  state.members.find(m => m.id===id).away.push({from,to});
  save();
  openPanelId = id; openPanelTab[id]='away';
  renderMembers();
  toast('Away period added!');
}

function removeAway(id, idx) {
  state.members.find(m => m.id===id).away.splice(idx,1);
  save();
  openPanelId = id; openPanelTab[id]='away';
  renderMembers();
}

function togglePanel(id) {
  if (openPanelId === id) { openPanelId = null; }
  else { openPanelId = id; if (!openPanelTab[id]) openPanelTab[id]='dates'; }
  renderMembers();
}

function setMTab(id, tab) {
  openPanelTab[id] = tab;
  renderMembers();
}

// ============================================================
// RENDER MEMBERS
// ============================================================
function renderMembers() {
  const list = document.getElementById('member-list');
  document.getElementById('member-count-pill').textContent =
    state.members.length + ' member' + (state.members.length!==1?'s':'');

  if (state.members.length===0) {
    list.innerHTML = '<li style="color:var(--muted);font-size:0.85rem;padding:10px 0;">No members yet. Add one above.</li>';
    return;
  }

  list.innerHTML = state.members.map(m => {
    const isOpen = openPanelId === m.id;
    const tab    = openPanelTab[m.id] || 'dates';

    // badges
    const badges = [];
    if (m.moveIn)  badges.push(`<span class="badge badge-movein">IN&nbsp;${fmtShort(m.moveIn)}</span>`);
    if (m.moveOut) badges.push(`<span class="badge badge-out">OUT&nbsp;${fmtShort(m.moveOut)}</span>`);
    const aw = (m.away||[]).length;
    if (aw>0)      badges.push(`<span class="badge badge-away">${aw} AWAY PERIOD${aw>1?'S':''}</span>`);

    // panel HTML
    let panelHtml = '';
    if (isOpen) {
      const tabBar = `
        <div class="manage-tabs">
          <button class="mtab ${tab==='dates'?'active':''}" onclick="setMTab('${m.id}','dates')">📅 Dates</button>
          <button class="mtab ${tab==='away'?'active':''}"  onclick="setMTab('${m.id}','away')">🏖 Away Periods</button>
        </div>`;

      let body = '';
      if (tab==='dates') {
        body = `
          <p class="info-note">
            <strong>Move-in:</strong> member is not billed for any days before this date.<br>
            <strong>Move-out:</strong> member is not billed for any days after this date.
          </p>
          <div class="form-row">
            <div class="form-group">
              <label>Move-in Date</label>
              <input type="date" id="ei-${m.id}" value="${m.moveIn||''}">
            </div>
            <div class="form-group">
              <label>Move-out Date</label>
              <input type="date" id="eo-${m.id}" value="${m.moveOut||''}">
            </div>
            <div class="form-group" style="display:flex;align-items:flex-end;">
              <button class="btn btn-ghost" style="width:100%;" onclick="saveDates('${m.id}')">Save Dates</button>
            </div>
          </div>`;
      }

      if (tab==='away') {
        const rows = (m.away||[]).length===0
          ? '<p style="color:var(--muted);font-size:0.82rem;margin-top:8px;">No away periods yet.</p>'
          : '<ul class="period-list">'+(m.away||[]).map((a,i)=>`
              <li class="period-item">
                <span class="badge badge-away">AWAY</span>
                <span class="pi-dates">${fmtShort(a.from)} → ${fmtShort(a.to)}</span>
                <button class="btn btn-danger btn-sm" onclick="removeAway('${m.id}',${i})">✕ Remove</button>
              </li>`).join('')+'</ul>';
        body = `
          <p class="info-note">
            <strong>Away</strong> = still lives in the dorm but is on vacation / out of town.<br>
            They are <strong style="color:var(--accent)">not billed</strong> on these days, which reduces the PAX count for those dates.
          </p>
          <div class="form-row">
            <div class="form-group">
              <label>Away From</label>
              <input type="date" id="af-${m.id}">
            </div>
            <div class="form-group">
              <label>Away Until (last away day)</label>
              <input type="date" id="at-${m.id}">
            </div>
            <div class="form-group" style="display:flex;align-items:flex-end;">
              <button class="btn btn-ghost" style="width:100%;" onclick="addAway('${m.id}')">Add Period</button>
            </div>
          </div>
          ${rows}`;
      }

      panelHtml = `<div class="manage-panel">${tabBar}${body}</div>`;
    }

    return `
    <li class="member-item">
      <div class="member-item-header">
        <div class="dot ${m.moveOut?'inactive':''}"></div>
        <span class="member-name">${m.name}</span>
        <div class="member-badges">
          ${badges.length ? badges.join('') : '<span style="font-size:0.74rem;color:var(--muted);font-family:\'DM Mono\',monospace;">no dates set</span>'}
        </div>
        <button class="btn btn-ghost btn-sm" onclick="togglePanel('${m.id}')">${isOpen?'Close ▲':'Manage ▼'}</button>
        <button class="btn btn-danger btn-sm" onclick="removeMember('${m.id}')">Remove</button>
      </div>
      ${panelHtml}
    </li>`;
  }).join('');
}

// ============================================================
// BILLS
// ============================================================
function addBill() {
  const label  = document.getElementById('bill-label').value.trim()||'Bill';
  const amount = parseFloat(document.getElementById('bill-amount').value);
  const start  = document.getElementById('bill-start').value;
  const end    = document.getElementById('bill-end').value;
  if (!amount||amount<=0) { toast('Enter a valid amount!','var(--danger)'); return; }
  if (!start||!end)       { toast('Enter start and end dates!','var(--danger)'); return; }
  if (parseDate(start)>parseDate(end)) { toast('Start must be before end!','var(--danger)'); return; }
  state.bills.push({ id:uid(), label, amount, start, end });
  document.getElementById('bill-label').value='';
  document.getElementById('bill-amount').value='';
  document.getElementById('bill-start').value='';
  document.getElementById('bill-end').value='';
  save(); renderBills(); toast('Bill added!');
}

function removeBill(id) {
  if (!confirm('Remove this bill?')) return;
  state.bills = state.bills.filter(b => b.id!==id);
  save(); renderBills(); populateBillSelect();
}

function renderBills() {
  const c = document.getElementById('bill-list');
  if (state.bills.length===0) { c.innerHTML='<p style="color:var(--muted);font-size:0.85rem;">No bills yet.</p>'; return; }
  c.innerHTML = state.bills.map(b => {
    const days = daysInRange(b.start,b.end).length;
    const td   = b.amount/days;
    return `
    <div class="card" style="margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
        <div style="flex:1;">
          <div style="font-weight:700;font-size:1.05rem;">${b.label}</div>
          <div style="font-size:0.8rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px;">
            ${fmtDate(b.start)} → ${fmtDate(b.end)} &nbsp;|&nbsp; ${days} days &nbsp;|&nbsp; Daily TD = ${fmt(td)}
          </div>
        </div>
        <div style="font-size:1.3rem;font-weight:800;font-family:'DM Mono',monospace;color:var(--accent);">${fmt(b.amount)}</div>
        <button class="btn btn-danger btn-sm" onclick="removeBill('${b.id}')">Remove</button>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// RESULTS
// ============================================================
function populateBillSelect() {
  const sel = document.getElementById('result-bill-select');
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- choose a bill --</option>' +
    state.bills.map(b=>`<option value="${b.id}">${b.label} (${fmtDate(b.start)} – ${fmtDate(b.end)})</option>`).join('');
  if (cur) sel.value = cur;
}

function renderResults() {
  const billId = document.getElementById('result-bill-select').value;
  const out    = document.getElementById('results-output');
  if (!billId) { out.innerHTML=''; return; }
  const bill = state.bills.find(b=>b.id===billId);
  if (!bill) return;

  const days     = daysInRange(bill.start, bill.end);
  const totalDays= days.length;
  const tdPerDay = bill.amount / totalDays;

  // Per-day PAX
  const dayData = days.map(d => {
    const dk      = dateKey(d);
    const present = state.members.filter(m => !isAbsent(m, dk));
    return { dk, date:d, present, pax:present.length };
  });

  // Per-member totals
  const totals = {};
  state.members.forEach(m => {
    totals[m.id] = { name:m.name, total:0, billed:0, away:0, outOfRange:0 };
  });

  dayData.forEach(day => {
    if (day.pax===0) return;
    const share = tdPerDay / day.pax;
    // present members
    day.present.forEach(m => { totals[m.id].total+=share; totals[m.id].billed+=1; });
    // absent members — categorise why
    state.members.forEach(m => {
      if (day.present.find(p=>p.id===m.id)) return;
      const d = parseDate(day.dk);
      const inDormRange =
        (!m.moveIn  || d>=parseDate(m.moveIn)) &&
        (!m.moveOut || d<=parseDate(m.moveOut));
      if (inDormRange) totals[m.id].away+=1;
      else             totals[m.id].outOfRange+=1;
    });
  });

  const zeroPaxDays    = dayData.filter(d=>d.pax===0).length;
  const totalCollected = Object.values(totals).reduce((a,b)=>a+b.total,0);

  const html = `
  <div class="card">
    <div class="card-title">${bill.label} — Summary</div>
    <div class="summary-grid">
      <div class="summary-box"><div class="s-label">Total Bill</div><div class="s-value">${fmt(bill.amount)}</div></div>
      <div class="summary-box"><div class="s-label">Bill Days</div><div class="s-value">${totalDays}</div></div>
      <div class="summary-box"><div class="s-label">Daily Rate (TD)</div><div class="s-value">${fmt(tdPerDay)}</div></div>
      <div class="summary-box"><div class="s-label">Total Collected</div><div class="s-value green">${fmt(totalCollected)}</div></div>
    </div>
    ${zeroPaxDays>0
      ? `<p style="font-size:0.8rem;color:var(--warn);font-family:'DM Mono',monospace;">
           ⚠ ${zeroPaxDays} day(s) had 0 occupants — ${fmt(zeroPaxDays*tdPerDay)} is unallocated.
         </p>` : ''}
  </div>

  <div class="card">
    <div class="card-title">Per-Member Breakdown</div>
    <div class="table-wrap">
    <table class="result-table">
      <thead>
        <tr>
          <th>Member</th>
          <th>Days Billed</th>
          <th>Days Away (vacation)</th>
          <th>Not In Dorm</th>
          <th>Amount Due</th>
        </tr>
      </thead>
      <tbody>
        ${Object.values(totals).sort((a,b)=>b.total-a.total).map(m=>`
          <tr>
            <td style="font-weight:600;">${m.name}</td>
            <td>${m.billed}</td>
            <td style="color:var(--accent2);">${m.away>0?m.away:'—'}</td>
            <td style="color:var(--muted);">${m.outOfRange>0?m.outOfRange:'—'}</td>
            <td class="amount">${fmt(m.total)}</td>
          </tr>`).join('')}
        <tr class="total-row">
          <td colspan="4">TOTAL</td>
          <td>${fmt(totalCollected)}</td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Daily PAX Grid — hover a chip to see who's present</div>
    <div class="day-grid">
      ${dayData.map(d=>{
        const label = d.date.toLocaleDateString('en-PH',{month:'short',day:'numeric'});
        const share = d.pax>0 ? fmt(tdPerDay/d.pax) : '—';
        const names = d.present.map(m=>m.name).join(', ')||'nobody';
        return `<div class="day-chip" title="${names}">
          <div style="color:var(--muted);font-size:0.68rem;">${label}</div>
          <div class="pax-num">${d.pax} pax</div>
          <div style="color:var(--accent2);font-size:0.68rem;">${share}</div>
        </div>`;
      }).join('')}
    </div>
    <p style="font-size:0.74rem;color:var(--muted);margin-top:10px;font-family:'DM Mono',monospace;">
      Each chip shows: date / number of people present / each person's share for that day.
    </p>
  </div>`;

  out.innerHTML = html;
}

// ============================================================
// INIT
// ============================================================
load();
renderMembers();
renderBills();
populateBillSelect();
</script>
</body>
</html>
